name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov flake8 black mypy
    
    - name: Format check with black
      run: black --check fg_vector_sampler/ tests/ || true
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 fg_vector_sampler/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-code is slightly better than before, success on new code
        flake8 fg_vector_sampler/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=140 --statistics
    
    - name: Type check with mypy
      run: mypy fg_vector_sampler/ --ignore-missing-imports || true
    
    - name: Run tests with pytest
      run: pytest tests/ -v --tb=short
    
    - name: Generate coverage report
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: pytest tests/ --cov=fg_vector_sampler --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy
    - name: Check format
      run: black --check fg_vector_sampler/
    - name: Lint
      run: flake8 fg_vector_sampler/ --max-line-length=140
    - name: Type check
      run: mypy fg_vector_sampler/ --ignore-missing-imports
